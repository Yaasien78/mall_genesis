<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>Pi.init({ version: "2.0", sandbox: true })</script>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0;min-height:100vh;color:#fff;font-family:Arial;overflow-x:hidden;background:#000814}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('background.jpg');background-size:cover;background-position:center;filter:blur(8px) brightness(0.4);z-index:-1}
 .container{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  h1{font-size:32px;margin:0 0 8px 0;font-weight:900;background:linear-gradient(180deg,#FFD700 0%,#FFA500 50%,#FF8C00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 2px 10px rgba(255,215,0,0.4)}
 .sub{font-size:15px;margin-bottom:35px;opacity:0.9;text-align:center}
 .foto{width:151px;height:227px;border:3px dashed #FFD700;border-radius:8px;background:rgba(0,0,0,0.3);position:relative;cursor:pointer;margin-bottom:25px;overflow:hidden}
 .foto img{width:100%!important;height:100%!important;object-fit:cover;border-radius:5px;display:none!important}
 .foto span{position:absolute;width:100%;height:100%;top:0;left:0;display:flex!important;align-items:center;justify-content:center;text-align:center;font-size:12px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
  input[type="file"]{display:none}
 .btn{width:100%;max-width:300px;padding:15px;border:none;border-radius:12px;background:#FFD700;color:#000;font-weight:900;font-size:17px;cursor:pointer;transition:0.2s}
 .btn:active{transform:scale(0.97)}
 .btn:disabled{opacity:0.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="container">
  <h1>Mall Genesis</h1>
  <div class="sub">Marketplace dan NFT</div>

  <label class="foto" onclick="document.getElementById('file').click()">
    <img id="img" />
    <span>Klik untuk<br>Kamera/Galeri</span>
    <input type="file" id="file" accept="image/*" onchange="uploadFoto(this)">
  </label>

  <button id="btnMasuk" class="btn">Masuk</button>
</div>

<script>
function uploadFoto(input){
  if(input.files && input.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      localStorage.setItem('fotoMG', e.target.result);
      let img = document.getElementById('img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.querySelector('.foto span').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

window.onload = function(){
  let f = localStorage.getItem('fotoMG');
  if(f){
    let img = document.getElementById('img');
    img.src = f;
    img.style.display = 'block';
    document.querySelector('.foto span').style.display = 'none';
  }
};

document.getElementById('btnMasuk').onclick = async function(){
  let b = this;
  b.textContent = 'Login...';
  b.disabled = true;

  try{
    const scopes = ['username', 'payments'];
    const auth = await Pi.authenticate(scopes);
    localStorage.setItem('pi_user', JSON.stringify({username: auth.user.username}));
    window.location.href = '/dashboard.html?user=' + auth.user.username;

  }catch(e){
    alert('Gagal login: ' + e.message + '\nPastikan buka dari Pi Browser');
    b.textContent = 'Masuk';
    b.disabled = false;
  }
};
</script>

<script src="menus.js"></script>
</body>
</html>
