<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  html,body{height:100vh;overflow:hidden}
  body{
    background:#000814;color:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:10px
  }

  /* Bintang2 langit malam */
  #stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
 .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
    animation:twinkle 3s infinite;box-shadow:0 0 4px #4a9eff}
  @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}

 .wrap{position:relative;z-index:1;width:100%;max-width:360px;display:flex;
    flex-direction:column;align-items:center;gap:12px}

  /* Head Mall Genesis - diturunin + lebih kecil */
  h1{
    font-size:34px;font-weight:900;text-align:center;margin-top:15px;
    background:linear-gradient(270deg, #C0C0C0 0%, #FFD700 50%, #C0C0C0 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-size:200% 200%;animation:gradient 4s ease infinite;
    text-shadow:0 0 20px rgba(255,215,0,0.4)
  }
  @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

 .subtitle{text-align:center;font-size:14px;color:#FFD700;font-weight:600}

  /* Kotak foto 4x6cm - sinkron ukuran */
 .photo-box{
    width:4cm;height:6cm;border:2px dashed #FFD700;border-radius:10px;
    background:rgba(255,215,0,0.05);cursor:pointer;display:flex;
    flex-direction:column;align-items:center;justify-content:center;
    transition:0.3s;overflow:hidden
  }
 .photo-box:hover{border-color:#fff;background:rgba(255,215,0,0.1)}
 .photo-box img{width:100%;height:100%;object-fit:cover;display:none}
 .photo-box span{font-size:11px;color:#FFD700;text-align:center;line-height:1.4}

  /* Box login dirampingin */
 .login-box{
    width:100%;background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);
    border:1px solid rgba(255,215,0,0.3);border-radius:14px;padding:14px 16px
  }
 .login-box label{font-size:12px;color:#aaa;margin-bottom:5px;display:block}
 .login-box input{
    width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,215,0,0.3);
    background:rgba(0,0,0,0.4);color:#FFD700;font-size:13px;font-weight:600
  }

 .btn{
    width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;
    background:linear-gradient(90deg,#FFD700,#C0C0C0);color:#000;font-size:15px;
    font-weight:800;cursor:pointer
  }
 .btn:active{transform:scale(0.97)}

  input[type=file]{display:none}
</style>
</head>
<body>

  <div class="wrap">
    <h1>Mall Genesis</h1>
    <p class="subtitle">Marketplace dan Galeri NFT</p>

    <!-- Kotak foto 4x6cm - hapus capture biar bisa pilih galeri/kamera -->
    <label class="photo-box">
      <img id="preview">
      <span id="txt">📷 Klik untuk ambil<br>dari Kamera/Galeri</span>
      <input type="file" accept="image/*" onchange="loadFoto(event)">
    </label>

    <!-- Login box dirampingin -->
    <div class="login-box">
      <label>Username Pi Otomatis</label>
      <input type="text" id="username" readonly placeholder="Klik Masuk untuk login Pi">
      <button class="btn" onclick="loginPi()">Masuk</button>
    </div>
  </div>
