<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  body{margin:0;padding:10px;background:#000814;color:#fff;font-family:Arial;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* Mall Genesis GEDE */
  h1{font-size:46px;margin:0;line-height:1.05;background:linear-gradient(270deg,#C0C0C0,#FFD700,#FFF,#FFD700,#C0C0C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:300% 100%;animation:slide 3s infinite;text-shadow:0 0 30px rgba(255,215,0,0.7)}
  @keyframes slide{0%{background-position:300% 0}100%{background-position:-300% 0}}
.sub{color:#FFD700;font-size:14px;margin:8px 0 18px;font-weight:600}

  /* Kotak foto 4x6cm */
.foto{
    width:4cm;height:6cm;border:2px dashed #FFD700;border-radius:8px;
    background:#0a0a0a;position:relative;cursor:pointer;overflow:hidden;margin-bottom:20px
  }
.foto img{width:100%;height:100%;object-fit:cover;display:none}
.foto span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#FFD700;font-size:11px;line-height:1.4}
.foto input{position:absolute;width:100%;height:100%;top:0;left:0;opacity:0;cursor:pointer}

  /* Tombol Masuk 1 biji doang, kotak kuning */
.btn{
    width:200px;padding:14px;border:none;border-radius:8px;
    background:#FFD700;color:#000;font-weight:900;font-size:15px;cursor:pointer;
    box-shadow:0 0 20px rgba(255,215,0,0.5)
  }
.btn:active{transform:scale(0.95)}
</style>
</head>
<body>
  <h1>Mall</h1>
  <h1>Genesis</h1>
  <div class="sub">Marketplace dan Galeri NFT</div>

  <!-- KOTAK FOTO 4x6cm -->
  <label class="foto">
    <img id="img">
    <span>📷 Klik untuk<br>Kamera/Galeri</span>
    <input type="file" id="file" accept="image/*">
  </label>

  <!-- TOMBOL MASUK 1 BIJI DOANG -->
  <button class="btn" onclick="masuk()">Masuk</button>

<script>
  // FOTO AKTIF
  document.getElementById('file').onchange = e => {
    let f = e.target.files[0];
    if(f){
      document.getElementById('img').src = URL.createObjectURL(f);
      document.getElementById('img').style.display = 'block';
      document.querySelector('.foto span').style.display = 'none';
    }
  };

  // KLIK MASUK = LOGIN PI + LANGSUNG KE BERANDA
  async function masuk(){
    let btn = document.querySelector('.btn');
    btn.textContent = 'Login...';
    btn.disabled = true;

    try{
      Pi.init({version:"2.0", sandbox:false}); // UDAH PUBLISH
      let auth = await Pi.authenticate(['username'], () => {});

      // Langsung redirect ke beranda/dashboard
      window.location.href = '/dashboard.html?user=' + auth.user.username;

    }catch(err){
      alert('Gagal login. Buka dari Pi Browser ya bang\n' + err.message);
      btn.textContent = 'Masuk';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
