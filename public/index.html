<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>Pi.init({ version: "2.0", sandbox: true })</script>
<style>
  *{box-sizing:border-box}
  *{box-sizing:border-box;}
body{margin:0;padding:0;min-height:100vh;color:#fff;font-family:Arial;overflow:hidden;background:transparent} /* GANTI #000 JADI transparent */
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="warp"></div>  <!-- TAMBAHIN INI -->
<div class="stars"></div>
<div class="container">
  <h1><span class="mall">Mall</span><br><span class="gen">Genesis</span></h1>
  <div class="sub">Marketplace dan NFT</div>

  <label class="foto" onclick="document.getElementById('file').click()">
    <img id="img" />
    <span>Klik untuk<br>Kamera/Galeri</span>
    <input type="file" id="file" accept="image/*" onchange="uploadFoto(this)">
  </label>

  <button id="btnMasuk" class="btn">Masuk</button>
</div>

<script>
function uploadFoto(input){
  if(input.files && input.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      localStorage.setItem('fotoMG', e.target.result);
      let img = document.getElementById('img');
      img.src = e.target.result;
      img.style.setProperty('display', 'block', 'important');
      document.querySelector('.foto span').style.setProperty('display', 'none', 'important');
      document.getElementById('btnMasuk').classList.add('show');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

window.onload = function(){
  let f = localStorage.getItem('fotoMG');
  if(f){
    let img = document.getElementById('img');
    img.src = f;
    img.style.setProperty('display', 'block', 'important');
    document.querySelector('.foto span').style.setProperty('display', 'none', 'important');
    document.getElementById('btnMasuk').classList.add('show');
  }
};

document.getElementById('btnMasuk').onclick = async function(){
  let b = this;
  b.textContent = 'Login...';
  b.disabled = true;
  try{
    const auth = await Pi.authenticate(['username', 'payments']);
    localStorage.setItem('pi_user', JSON.stringify({username: auth.user.username}));
    window.location.href = '/dashboard.html?user=' + auth.user.username;
  }catch(e){
    alert('Gagal login: ' + e.message);
    b.textContent = 'Masuk';
    b.disabled = false;
  }
};
</script>
<script src="menu.js?v=9"></script>
<style>
/* 1. Terowongan Galaksi Spiral Ungu */
.warp{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;
  background: radial-gradient(ellipse at center, rgba(255,255,255,1) 0%, rgba(255,180,255,0.6) 10%, rgba(138,43,226,0.5) 30%, rgba(75,0,130,0.7) 60%, #000 100%);
  animation: zoomIn 15s infinite linear;
}
@keyframes zoomIn{
 0%{transform:scale(0.5) rotate(0deg)}
 100%{transform:scale(4) rotate(720deg)}
}

/* 2. Bintang Ngebut Hyperspace */
.stars{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
  background-image: radial-gradient(2px 2px at 20% 30%, #fff, transparent), radial-gradient(1px 1px at 60% 80%, #fff, transparent);
  background-repeat: repeat;
  background-size: 300px 300px;
  animation: starfield 2s linear infinite;
}
@keyframes starfield{
 0%{background-position: 0 0}
 100%{background-position: 0 2000px}
</style>
</body>
</html>
