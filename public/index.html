<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;min-height:100vh;color:#fff;font-family:Arial;background:#000814;overflow-x:hidden}

  /* BACKGROUND BINTANG DI BELAKANG */
  body::before{
    content:"";position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
    background-image:
      radial-gradient(2px 2px at 20px 30px, #fff, transparent),
      radial-gradient(2px 2px at 40px 70px, #fff, transparent),
      radial-gradient(1px 1px at 90px 40px, #fff, transparent),
      radial-gradient(1px 1px at 130px 80px, #fff, transparent);
    background-repeat:repeat;background-size:200px 100px;opacity:0.8
  }

  /* KONTEN DI ATAS BINTANG */
.container{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}

  /* KOTAK HITAM LIST TIPIS 25% */
.wrap{
    width:100%;max-width:320px;background:rgba(0,0,0,0.25);
    backdrop-filter:blur(6px);border:1px solid rgba(255,215,0,0.4);
    border-radius:16px;padding:25px 20px;display:flex;flex-direction:column;align-items:center;gap:15px;
    box-shadow:0 8px 32px rgba(0,0,0,0.6)
  }

  /* MALL GENESIS */
  h1{font-size:42px;margin:0;line-height:1.1;background:linear-gradient(270deg,#C0C0C0,#FFD700,#FFF,#FFD700,#C0C0C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:300% 100%;animation:slide 3s infinite}
  @keyframes slide{0%{background-position:300% 0}100%{background-position:-300% 0}}
.sub{color:#FFD700;font-size:13px;margin:0 0 5px;font-weight:600}

  /* KOTAK FOTO 4x6cm - DITUTUP KURUNG KURAWALNYA */
.foto{
    width:4cm;height:6cm;border:2px dashed #FFD700;border-radius:10px;
    background:rgba(0,0,0,0.35);position:relative;cursor:pointer;overflow:hidden;
    display:flex;align-items:center;justify-content:center;flex-shrink:0
  }
.foto img{width:100%;height:100%;object-fit:cover;display:none}
.foto span{color:#FFD700;font-size:11px;text-align:center;line-height:1.4}
.foto input{position:absolute;width:100%;height:100%;top:0;left:0;opacity:0;cursor:pointer}

  /* ICON KAMERA POJOK */
.kameraBtn{
    position:absolute;bottom:5px;right:5px;width:28px;height:28px;
    background:#FFD700;border-radius:50%;border:none;cursor:pointer;
    font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:3
  }
.kameraBtn:active{transform:scale(0.9)}

  /* TOMBOL MASUK */
.btn{width:100%;padding:14px;border:none;border-radius:10px;background:#FFD700;color:#000;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 4px 15px rgba(255,215,0,0.4)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.6}
</style>
</head>
<body>
  <div class="container">
    <div class="wrap">
      <h1>Mall</h1>
      <h1>Genesis</h1>
      <div class="sub">Marketplace dan Galeri NFT</div>

      <!-- KOTAK FOTO 4x6cm + ICON KAMERA -->
      <label class="foto">
        <img id="img">
        <span>📷 Klik untuk<br>Kamera/Galeri</span>
        <input type="file" id="file" accept="image/*" capture="environment">
        <button class="kameraBtn" type="button" onclick="document.getElementById('file').click()">📷
