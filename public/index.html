<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #ffffff; margin:0; }
    .bg-dongker { background-color: #1e293b; } /* DONGKER SS 09.34 */
    .bg-ungu { background-color: #7c3aed; } /* UNGU SS 09.34 LEBIH TUA */
    .border-kuning-2px { border-color: #facc15; border-width: 2px; } /* GARIS 1 AJA 2PX */
    header { height: 56px; z-index: 30; }
    footer { height: 56px; z-index: 30; }
    main { padding-top: 56px; padding-bottom: 56px; }
    
    .text-ss {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      line-height: 1.1; 
    }
  </style>
</head>
<body class="font-sans bg-white">
  <!-- HEAD: GARIS BAWAH 2PX SAJA -->
  <header class="bg-dongker px-3 border-b-2 border-kuning-2px flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-2xl text-yellow-400">≡</a>
    <h1 class="text-2xl font-black text-white text-ss">My Track</h1>
    
    <!-- LOGO PI UNGU TUA PLEK SS 09.34 -->
    <div class="w-10 h-10 rounded-full bg-ungu border-2 border-yellow-400 flex items-center justify-center">
      <span class="text-yellow-400 text-2xl font-black">π</span>
    </div>
  </header>

  <!-- BOX: GARIS 2PX SAJA, KONTEN GESER BAWAH -->
  <main class="px-2">
    <div class="bg-ungu border-kuning-2px rounded-2xl p-3 m-1 h-[calc(100vh-112px-8px)] flex-col justify-end text-center"> 
      
      <!-- MT-AUTO = DORONG SEMUA KE BAWAH BIAR FULL -->
      <div class="flex-col gap-1 mt-auto">
        <p class="text-xl text-ss text-white">Harga Pi/USDT</p>
        <p id="hargaUSDT" class="text-4xl text-ss text-yellow-400">$0.0000</p>

        <p class="text-lg text-ss text-yellow-400">Harga /pi = Rp 0</p>
        <p id="hargaIDR" class="text-lg text-ss text-white">Rp 0</p>

        <p class="text-base text-ss text-white">0.00%</p>

        <p id="kursUSDIDR" class="text-sm text-ss text-white">Kurs: 1 USD = Rp 17934.50 | Update</p>
        
        <p id="tanggal" class="text-sm text-ss text-yellow-300 mt-1">Kamis, 2 Juli 2026</p>
      </div>

    </div>
  </main>

  <!-- FOOT: GARIS ATAS 2PX SAJA -->
  <footer class="bg-dongker px-3 border-t-2 border-kuning-2px flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnLogin" class="text-xl text-ss text-yellow-400 w-full font-black">Loading...</button>
  </footer>

  <script>
    let lastPiUSDT = 0; let lastPiIDR = 0; let lastKurs = 0;

    function updateTanggal() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
      document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', options);
    }
    updateTanggal(); 

    try {
      Pi.init({ version: "2.0", sandbox: true });
      Pi.authenticate({ scopes: ['username', 'payments'], onIncompletePaymentFound: () => {} })
 .then(auth => { document.getElementById('btnLogin').innerText = `Welcome ${auth.user.username}`; })
 .catch(() => { document.getElementById('btnLogin').innerText = 'Loading...'; });
    } catch(e) { document.getElementById('btnLogin').innerText = 'Loading...'; }

    async function updateData() {
      try {
        const apiUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=usd,idr';
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
        const res = await fetch(proxyUrl);
        const data = await res.json();
        
        const pi = data['pi-network'];
        const usd = data['usd'];

        if(pi) {
          const newUSDT = pi.usd || 0;
          const newIDR = pi.idr || 0;
          document.getElementById('hargaUSDT').innerText = `$${newUSDT.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${newIDR.toLocaleString('id-ID', {maximumFractionDigits: 0})}`;
        }
        if(usd) {
          const newKurs = usd.idr;
          document.getElementById('kursUSDIDR').innerText = `Kurs: 1 USD = Rp ${newKurs.toLocaleString('id-ID', {minimumFractionDigits: 2})} | Update`;
        }
      } catch (e) { console.log("API Gagal:", e); }
    }
    updateData(); 
    setInterval(updateData, 3000);
  </script>
</body>
</html>
