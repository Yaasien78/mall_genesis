<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Track</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  body{background:#1A0033;color:#DAA520;font-family:'Segoe UI', Arial, sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;flex-direction:column}
  h1{font-size:2.5em; font-weight:900; text-shadow:2px 2px 4px #000; margin:0;}
  .loader {border: 4px solid #4B0082; border-top: 4px solid #DAA520; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto 0;}
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
</style>
</head>
<body>
  <h1>My Track</h1>
  <div class="loader"></div>
  <p id="status">Loading Pi SDK...</p>

<script>
  // WAJIB: sandbox false karena status lu "mainet App M"
  Pi.init({ version: "2.0", sandbox: false }); 

  Pi.onReady(async function() { 
    document.getElementById('status').textContent = 'Cek Login...';

    try {
      let token = localStorage.getItem('pi_accessToken');
      if(!token){ 
        document.getElementById('status').textContent = 'Minta Izin...';
        const auth = await Pi.authenticate(['username', 'payments', 'wallet_address'], ()=>{});
        localStorage.setItem('pi_accessToken', auth.accessToken);
        localStorage.setItem('pi_username', auth.user.username);
      }
      
      document.getElementById('status').textContent = 'Masuk...';
      window.location.replace('/dashboard.html'); // PAKAI REPLACE BIAR GAK BISA BACK

    } catch(e){
      console.error('Gagal Login:', e);
      document.getElementById('status').textContent = 'Gagal: ' + e.message;
    }
  });
</script>
</body>
</html>
