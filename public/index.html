<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mall Genesis - Login</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  html,body{height:100%;overflow:hidden}
  body{
    background:#000814;color:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;padding:5px 10px
  }

  /* Bintang2 - dibikin fixed biar gak hilang */
  #stars{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
    animation:twinkle 4s infinite;box-shadow:0 0 5px #4a9eff}
  @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}

.wrap{position:relative;z-index:1;width:100%;max-width:330px;display:flex;
    flex-direction:column;align-items:center;gap:8px;margin-top:3vh}

  /* Head emas-silver kanan ke kiri */
  h1{
    font-size:30px;font-weight:900;text-align:center;
    background:linear-gradient(270deg, #C0C0C0 0%, #FFD700 50%, #C0C0C0 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-size:200% 200%;animation:gradient 4s ease infinite;
    text-shadow:0 0 12px rgba(255,215,0,0.5);margin-bottom:2px
  }
  @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.subtitle{text-align:center;font-size:12px;color:#FFD700;font-weight:600}

  /* Kotak foto 4x6cm - pake onclick biar aktif di Pi Browser */
.photo-box{
    width:4cm;height:6cm;border:2px dashed #FFD700;border-radius:8px;
    background:rgba(255,215,0,0.08);cursor:pointer;display:flex;
    flex-direction:column;align-items:center;justify-content:center;
    transition:0.2s;overflow:hidden;position:relative
  }
.photo-box:active{transform:scale(0.98);border-color:#FFF}
.photo-box img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;display:none}
.photo-box span{font-size:10px;color:#FFD700;text-align:center;line-height:1.3;z-index:2}

  /* Login box super ramping */
.login-box{
    width:100%;background:rgba(255,255,255,0.04);backdrop-filter:blur(5px);
    border:1px solid rgba(255,215,0,0.25);border-radius:10px;padding:10px 12px
  }
.login-box label{font-size:11px;color:#ccc;margin-bottom:3px;display:block}
.login-box input{
    width:100%;padding:7px;border-radius:6px;border:1px solid rgba(255,215,0,0.25);
    background:rgba(0,0,0,0.35);color:#FFD700;font-size:12px;font-weight:600;text-align:center
  }

.btn{
    width:100%;padding:10px;margin-top:6px;border:none;border-radius:7px;
    background:linear-gradient(90deg,#FFD700 0%, #C0C0C0 100%);color:#000;font-size:13.5px;
    font-weight:800;cursor:pointer
  }
.btn:active{transform:scale(0.97)}

  #fileInput{display:none}
</style>
</head>
<body>
  <div id="stars"></div>

  <div class="wrap">
    <h1>Mall Genesis</h1>
    <p class="subtitle">Marketplace dan Galeri NFT</p>

    <!-- Kotak foto 4x6cm - klik div nya langsung, bukan label -->
    <div class="photo-box" onclick="document.getElementById('fileInput').click()">
      <img id="preview">
      <span id="txt">📷 Klik untuk ambil<br>dari Kamera/Galeri</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="loadFoto(event)">

    <div class="login-box">
      <label>Username Pi Otomatis</label>
      <input type="text" id="username" readonly placeholder="Loading Pi...">
      <button class="btn" onclick="masuk()">Masuk</button>
    </div>
  </div>

<script>
  // Bikin bintang2 60 biji
  const stars = document.getElementById('stars');
  for(let i=0; i<60; i++){
    let s = document.createElement('div');
    s.className = 'star';
    s.style.top = Math.random()*100 + 'vh';
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDelay = Math.random()*4 + 's';
    stars.appendChild(s);
  }

  // Auto login Pi pas buka halaman - biar username langsung muncul
  window.onload = async () => {
    try{
      Pi.init({ version: "2.0", sandbox: true });
      const auth = await Pi.authenticate(['username'], ()=>{});
      document.getElementById('username').value = '@' + auth.user.username;
    } catch(err){
      document.getElementById('username').value = 'Buka dari Pi Browser';
      console.log('Pi SDK error:', err);
    }
  }

  // Load foto - pake onclick div biar aktif
  function loadFoto(e){
    const file = e.target.files[0];
    if(file && file.type.startsWith('image/')){
      const reader = new FileReader();
      reader.onload = evt => {
        document.getElementById('preview').src = evt.target.result;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('txt').style.display = 'none';
      }
      reader.readAsDataURL(file);
    }
  }

  // Tombol Masuk = redirect ke halaman 2
  function masuk(){
    const user = document.getElementById('username').value;
    if(user === 'Buka dari Pi Browser' || user === 'Loading Pi...'){
      alert('Login Pi dulu bang, buka dari Pi Browser');
      return;
    }
    window.location.href = `/dashboard.html?user=${user.replace('@','')}`;
  }
</script>
</body>
</html>
