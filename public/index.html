<style>
  *{box-sizing:border-box}
  body{
    margin:0;padding:20px;color:#fff;font-family:Arial;text-align:center;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;

    background-position: 0 0, 40px 60px;

  /* KOTAK HITAM LIST TIPIS 25% */
 .wrap{

    box-shadow:0 8px 32px rgba(0,0,0,0.6)

  @keyframes slide{0%{background-position:300% 0}100%{background-position:-300% 0}}
