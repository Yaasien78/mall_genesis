<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style> 
    body { 
      background-color: #2e1a4d; 
      background-image: linear-gradient(rgba(173, 216, 230, 0.1), rgba(173, 216, 230, 0.1)); 
      overflow: hidden; /* Biar gak bisa di scroll */
    } 
    .border-gold-2 { border: 2px solid #fbbf24; } 
    .bg-dongker { background-color: #0f1a2e; } 
  </style>
</head>
<body class="text-white flex justify-center items-center h-screen">

  <!-- WRAPPER PAS LAYAR HP. MAX 400px -->
  <div class="w-full max-w-sm h-screen flex-col bg-[#2e1a4d]">

    <!-- HEAD BIRU DONGKER 2PX PADDING KECIL -->
    <header class="bg-dongker p-2 border-gold-2 flex items-center justify-center flex-shrink-0">
      <h1 class="text-2xl font-bold text-black bg-yellow-400 px-3 py-0.5 rounded-md">My Track</h1>
    </header>

    <!-- MAIN AUTO NGEPAS -->
    <main class="p-3 flex-1 flex-col gap-3">
      
      <!-- CARD HARGA PADDING KECIL -->
      <div class="bg-purple-800 border-gold-2 rounded-xl p-3 text-center">
        <h2 class="text-lg text-white">Harga Pi/USD Live</h2>
        <p id="hargaUSD" class="text-5xl font-extrabold text-yellow-400 my-1">$0.1150</p>
        <p id="hargaIDR" class="text-xl text-yellow-400">Harga /pi = Rp 2.063</p>
        <p id="persen" class="text-2xl text-green-400 font-bold">0.94%</p>
        <p class="text-xs text-purple-300 mt-1">Kurs: 1 USD = Rp 17934.50 | Update <span id="jam"></span></p>
      </div>

      <!-- GRAFIK TINGGI PAS. GAK KE PANJANGAN -->
      <div class="bg-purple-800 border-gold-2 rounded-xl p-2 flex-1 min-h-0">
        <canvas id="priceChart"></canvas>
      </div>
    </main>

    <!-- FOOT BIRU DONGKER 2PX PADDING KECIL -->
    <footer class="bg-dongker p-2 border-gold-2 text-center flex-shrink-0">
      <p class="text-lg font-bold text-yellow-400">Welcome <span id="namaUser">Yaasien</span></p>
    </footer>

  </div>

  <script>
    Pi.init({ version: "2.0", sandbox: false });
    Pi.authenticate(['username']).then(auth => {
      document.getElementById('namaUser').innerText = auth.user.username;
    }).catch(() => {
      document.getElementById('namaUser').innerText = 'Yaasien';
    });

    const ctx = document.getElementById('priceChart');
    new Chart(ctx, {
      type: 'line',
      data: { labels: ['','','',''],
        datasets: [{ 
          data: [0.1140, 0.1148, 0.1155, 0.1150, 0.1160, 0.1150],
          borderColor: '#fbbf24', 
          borderWidth: 2, 
          backgroundColor: 'rgba(251, 191, 36, 0.2)',
          fill: true, 
          tension: 0.4, 
          pointRadius: 0 
      }]},
      options: { 
        maintainAspectRatio: false, // WAJIB BIAR PAS DI BOX
        scales: { y: { display: false }, x: { display: false } }, 
        plugins: { legend: { display: false }
      }
    });

    document.getElementById('jam').innerText = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
  </script>
</body>
</html>
