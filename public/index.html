<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mall Genesis</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;min-height:100vh;color:#fff;font-family:Arial;overflow-x:hidden}

  /* BACKGROUND LANGIT GELAP PENUH BINTANG + NEBULA BIRU */
  body{
    background: radial-gradient(ellipse at center, #0a1a3a 0%, #000814 70%, #000 100%);
  }
  body::before{
    content:"";position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
    background-image:
      radial-gradient(1px 1px at 25px 35px, #fff, transparent),
      radial-gradient(1px 1px at 60px 80px, #fff, transparent),
      radial-gradient(2px 2px at 120px 50px, #fff, transparent),
      radial-gradient(1px 1px at 180px 90px, #fff, transparent),
      radial-gradient(1px 1px at 40px 140px, #fff, transparent),
      radial-gradient(2px 2px at 160px 180px, #fff, transparent),
      radial-gradient(1px 1px at 100px 220px, #fff, transparent),
      radial-gradient(1px 1px at 200px 240px, #fff, transparent);
    background-repeat:repeat;
    background-size:250px 250px;
    opacity:0.9;
    animation:twinkle 8s infinite
  }
  @keyframes twinkle{0%,100%{opacity:0.9}50%{opacity:0.6}}

  /* KONTEN TENGAH */
.container{position:relative;z-index:1;width:100%;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;gap:20px}

  /* MALL GENESIS GLOW */
  h1{font-size:48px;margin:0;line-height:1.1;font-weight:900;color:#FFD700;text-shadow:0 0 25px rgba(255,215,0,0.9), 0 0 50px rgba(255,215,0,0.5)}
.sub{color:#FFD700;font-size:14px;margin:-10px 0 10px;font-weight:600;text-shadow:0 0 10px rgba(255,215,0,0.6)}

  /* KOTAK FOTO 4x6cm GARIS PUTUS KUNING */
.foto{
    width:4cm;height:6cm;border:3px dashed #FFD700;border-radius:12px;
    background:rgba(0,0,0,0.4);position:relative;cursor:pointer;overflow:hidden;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 0 20px rgba(255,215,0,0.4)
  }
.foto img{width:100%;height:100%;object-fit:cover;display:none}
.foto span{color:#FFD700;font-size:12px;text-align:center;line-height:1.4;font-weight:600}
.foto input{position:absolute;width:100%;height:100%;top:0;left:0;opacity:0;cursor:pointer}

  /* TOMBOL MASUK GLOW */
.btn{
    width:100%;max-width:280px;padding:16px;border:none;border-radius:12px;
    background:#FFD700;color:#000;font-weight:900;font-size:16px;cursor:pointer;
    box-shadow:0 0 25px rgba(255,215,0,0.7);margin-top:10px
  }
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.6}
</style>
</head>
<body>
  <div class="container">
    <h1>Mall<br>Genesis</h1>
