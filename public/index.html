<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> 
    body { background-color: #2e1a4d; overflow: hidden; } 
    .border-gold-2-tb { border-top: 2px solid #fbbf24; border-bottom: 2px solid #fbbf24; } /* Garis 2px Atas Bawah doang */
    .border-gold-2 { border: 2px solid #fbbf24; } 
    .bg-dongker { background-color: #0f1a2e; } /* Biru Dongker Head/Foot */
    .bg-putih-biru-10 { background-color: rgba(173, 216, 230, 0.1); } /* Kotak Chart */
  </style>
</head>
<body class="text-white flex justify-center items-center h-screen font-sans">

  <div class="w-full max-w-sm h-screen flex-col bg-[#2e1a4d]">

    <!-- HEAD BIRU DONGKER GARIS 2PX ATAS BAWAH OPSI 2 -->
    <header class="bg-dongker p-3 border-gold-2-tb flex items-center justify-between flex-shrink-0">
      <!-- TOMBOL MENU GARIS 3 -->
      <a href="ads.html" class="text-3xl text-yellow-400">≡</a> 
      
      <!-- MY TRACK PUTIH DOANG DI ATAS BIRU DONGKER -->
      <h1 class="text-2xl font-extrabold text-white tracking-wide">My Track</h1> 

      <!-- LOGO PI KAN ATAS -->
      <img src="https://minepi.com/favicon.ico" alt="Pi" class="w-8 h-8 rounded-full border-2 border-yellow-400">
    </header>

    <main class="p-3 flex-1 flex-col gap-3">
      <!-- CARD HARGA -->
      <div class="bg-purple-800 border-gold-2 rounded-2xl p-3 text-center">
        <h2 class="text-lg text-white">Harga Pi/USD Live</h2>
        <p id="hargaUSD" class="text-5xl font-extrabold text-yellow-400 my-1">$0.1150</p>
        <p id="hargaIDR" class="text-xl text-yellow-400">Harga /pi = Rp 2.063</p>
        <p id="persen" class="text-2xl text-green-400 font-bold">0.94%</p>
        <p class="text-xs text-purple-300 mt-1">Kurs: 1 USD = Rp 17934.50 | Update <span id="jam"></span></p>
      </div>

      <!-- KOTAK CHART PUTIH KEBIRUAN 10% -->
      <div class="bg-putih-biru-10 border-gold-2 rounded-2xl flex-1"></div>
    </main>

    <!-- FOOT BIRU DONGKER GARIS 2PX + WELCOME USERNAME -->
    <footer class="bg-dongker p-2 border-gold-2-tb text-center flex-shrink-0">
      <p class="text-xl font-bold text-yellow-400">Welcome <span id="namaUser">Yaasien</span></p>
    </footer>

  </div>

  <script>
    Pi.init({ version: "2.0", sandbox: false });
    Pi.authenticate(['username']).then(auth => {
      document.getElementById('namaUser').innerText = auth.user.username;
    }).catch(() => {
      document.getElementById('namaUser').innerText = 'Yaasien';
    });

    document.getElementById('jam').innerText = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
  </script>
</body>
</html>
