<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>My Track</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: Arial, sans-serif; }
    .bg-dongker { background-color: #1e293b; } 
    .bg-ungu-tua { background-color: #6d28d9; } /* UNGU TUA KEBIRUAN */
    .bg-putih { background-color: #ffffff; }
    .border-kuning-b { border-bottom: 2px solid #facc15; } /* GARIS MENU 1 AJA */
    .border-kuning-t { border-top: 2px solid #facc15; }
    .border-kuning { border: 2px solid #facc15; }
    .text-ss { font-family: Impact, 'Arial Black', sans-serif; font-weight: 900; text-shadow: 0 3px 6px rgba(0,0,0,0.9); line-height: 1.1; }
    .text-white { color: #fff; }
    .text-yellow { color: #facc15; }
    .text-sky { color: #7dd3fc; }
    .text-green { color: #86efac; }
    .text-lg { font-size: 18px; } /* SEMUA SAMA */
    .font-black { font-weight: 900; }
    .text-center { text-align: center; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .flex-col { flex-direction: column; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .mt-auto { margin-top: auto; } /* DORONG KE BAWAH */
    .mb-0 { margin-bottom: 0; }
    .p-2 { padding: 8px; }
    .px-2 { padding-left: 8px; padding-right: 8px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .pt-2 { padding-top: 8px; } /* MEPET ATAS */
    .pb-2 { padding-bottom: 8px; } /* MEPET BAWAH */
    .m-1 { margin: 4px; }
    .w-full { width: 100%; }
    .w-10 { width: 40px; }
    .h-10 { height: 40px; }
    .w-12 { width: 48px; }
    .h-12 { height: 48px; }
    .rounded-full { border-radius: 9999px; }
    .rounded-3xl { border-radius: 24px; }
    .rounded-lg { border-radius: 8px; }
    .ring-2 { box-shadow: 0 0 0 2px #93c5fd; }
    .fixed { position: fixed; }
    .top-0 { top: 0; }
    .bottom-0 { bottom: 0; }
    header, footer { height: 56px; }
    main { padding-top: 56px; padding-bottom: 56px; }
    button { background: none; border: none; }
  </style>
</head>
<body>
  <header class="bg-dongker px-2 border-kuning-b flex items-center justify-between fixed top-0 w-full">
    <a href="menu.html" class="text-2xl text-yellow">≡</a>
    <h1 class="text-2xl font-black text-white text-ss">My Track</h1>
    <!-- LOGO π PUTIH SEMUA -->
    <div class="w-10 h-10 rounded-full bg-putih border-kuning flex items-center justify-center">
      <span class="text-white text-2xl font-black">π</span>
    </div>
  </header>

  <main class="px-2">
    <!-- PT-2 PB-2 = MEPET ATAS BAWAH. FLEX-COL SPACE-BETWEEN = PECAH ATAS BAWAH -->
    <div class="bg-ungu-tua border-kuning rounded-3xl px-2 pt-2 pb-2 m-1" style="height: calc(100vh - 112px - 8px); display: flex; flex-direction: column; justify-content: space-between;"> 
        
        <!-- BLOK ATAS = MEPET GARIS ATAS -->
        <div class="text-center">
          <p class="text-lg text-ss text-white">Harga Pi/USDT</p>
          <p id="hargaUSDT" class="text-lg text-ss text-white">$0.1154</p>
          <p class="text-lg text-ss text-sky">Pi/Rupiah</p>
          <p id="hargaIDR" class="text-lg text-ss text-white">Rp 2.076,48</p>
          <p class="text-lg text-ss text-green">Dollar/Rupiah</p>
          <p id="kursUSDIDR" class="text-lg text-ss text-white">Rp 16.848,58</p>
          
          <p class="text-lg text-ss text-white">Harga Pi/dollar</p>
          <p class="text-lg text-ss text-white">Xxxxxxx</p>
          <p class="text-lg text-ss text-white">Hjjkk</p>
          <p class="text-lg text-ss text-white">Xxxcccc</p>
          <p class="text-lg text-ss text-white">Jxxxxxx</p>
          <p class="text-lg text-ss text-white">Xcccxcx</p>
        </div>

        <!-- BLOK BAWAH = MEPET GARIS BAWAH -->
        <div class="text-center mb-0">
          <div class="w-12 h-12 rounded-lg border-kuning ring-2 mx-auto" style="background:#3b82f6; display:flex; align-items:center; justify-content:center;">
            <p class="text-lg text-ss text-white" style="line-height:1;">My<br>Track</p>
          </div>
          <p class="text-lg text-ss text-white mt-0.5 mb-0">Welcome...xxxxxxxxxx<br>@2026</p>
        </div>
    </div>
  </main>

  <footer class="bg-dongker px-3 border-kuning-t flex items-center justify-center fixed bottom-0 w-full">
    <button id="btnBayar" class="text-lg text-ss text-yellow w-full">Login Pi</button>
  </footer>

  <script>
    let currentUser = null;
    const btn = document.getElementById('btnBayar');
    window.onload = function() { Pi.init({ version: "2.0", sandbox: true }); };

    // LOGIN DIAKTIFKAN
    async function loginPi() {
      try {
        btn.innerText = 'Login...';
        const auth = await Pi.authenticate({ scopes: ['username'] }); 
        currentUser = auth.user;
        btn.innerText = `Halo ${currentUser.username}`; // LOGIN SUKSES
      } catch (err) {
        btn.innerText = 'Login Pi';
        alert('Login Gagal: ' + err); 
      }
    }
    btn.onclick = loginPi;

    async function updateData() {
      try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=pi-network,usd&vs_currencies=usd,idr'));
        const data = await res.json();
        if(data['pi-network']) {
          document.getElementById('hargaUSDT').innerText = `$${data['pi-network'].usd.toFixed(4)}`;
          document.getElementById('hargaIDR').innerText = `Rp ${data['pi-network'].idr.toLocaleString('id-ID')}`;
        }
        if(data['usd']) {
          document.getElementById('kursUSDIDR').innerText = `Rp ${data['usd'].idr.toLocaleString('id-ID', {minimumFractionDigits: 2})}`;
        }
      } catch (e) {}
    }
    updateData(); 
    setInterval(updateData, 3000);
  </script>
</body>
  </html>
