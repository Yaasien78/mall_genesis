<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>All Link App</title>
<style>
:root{--biru:#0A1F44;--ungu:#4B0082;--emas:#DAA520;--hitam:#000;}
body,html{margin:0;min-height:100%;background:#1A0033;color:#fff;font-family:'Segoe UI';text-align:center;}
.header{padding:12px 15px;display:flex;align-items:center;background:var(--biru);border-bottom:3px solid var(--emas);position:sticky;top:0;z-index:10;}
.back{font-size:2em;color:var(--emas);text-decoration:none;margin-right:10px;}
.logo{font-size:1.5em;font-weight:900;color:var(--emas);text-align:center;flex-grow:1;}
.main{padding:25px 15px;max-width:500px;margin:0 auto;}
.avatar{width:100px;height:100px;border-radius:50%;border:4px solid var(--emas);margin:0 auto 15px;background:#333;object-fit:cover;}
.nama{font-size:1.4em;font-weight:900;color:var(--emas);margin-bottom:5px;}
.bio{font-size:0.9em;color:#aaa;margin-bottom:25px;}
.link-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:var(--ungu);color:#fff;border:2px solid var(--emas);border-radius:12px;padding:15px;margin-bottom:12px;font-weight:700;font-size:1em;text-decoration:none;transition:0.2s;}
.link-btn:hover{background:var(--emas);color:var(--hitam);transform:scale(1.02);}
.link-btn .icon{font-size:1.5em;}
.footer{padding:20px;font-size:0.8em;color:#aaa;}
</style>
</head>
<body>
<header class="header">
  <a href="menu.html" class="back">←</a>
  <div class="logo">7. All Link App</div>
  <div style="width:2em"></div>
</header>

<main class="main">

  <div class="nama">@MyTrack</div>
  <div class="bio">Ekosistem Pi Network Terbesar | Shop, Chat, NFT, Travel</div>

  <!-- ADMIN TINGGAL TEMPEL LINK DI SINI -->
  <a href="https://facebook.com/MyTrack" target="_blank" class="link-btn">
    <span class="icon">📘</span> Facebook
  </a>
  <a href="https://twitter.com/MyTrack" target="_blank" class="link-btn">
    <span class="icon">𝕏</span> Twitter / X
  </a>
  <a href="https://t.me/MyTrack" target="_blank" class="link-btn">
    <span class="icon">✈️</span> Telegram
  </a>
  <a href="https://instagram.com/MyTrack" target="_blank" class="link-btn">
    <span class="icon">📸</span> Instagram
  </a>
  <a href="https://youtube.com/@MyTrack" target="_blank" class="link-btn">
    <span class="icon">▶️</span> YouTube
  </a>
  <a href="https://tiktok.com/@MyTrack" target="_blank" class="link-btn">
    <span class="icon">🎵</span> TikTok
  </a>
  <a href="https://wa.me/6283869845636" target="_blank" class="link-btn">
    <span class="icon">💬</span> WhatsApp Admin
  </a>
  <a href="https://pi.network" target="_blank" class="link-btn">
    <span class="icon">🟣</span> Pi Network Official
  </a>

</main>

<footer class="footer">
  My Track V=43 © 2026 | Swipe Kiri/Kanan
</footer>

<script src="menu.js"></script>
</body>
