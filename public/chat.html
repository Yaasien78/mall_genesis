<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script> 
<style>
  body { font-family: system-ui; background: #2d004d; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
  header { 
    padding: 8px; 
    background: #001f4d; 
    display: flex;
    gap: 8px;
    border-bottom: 3px solid #fbbf24; 
  }
  .tabBtnHeader { 
    flex: 1; 
    padding: 10px 4px; 
    border: 2px solid #fbbf24; 
    border-radius: 12px; 
    background: #5a189a; 
    color: #fff; 
    font-weight: 700; 
    cursor: pointer; 
    font-size: 12px;
  }
  .tabBtnHeader.active { 
    background: #7b2cbf; 
    box-shadow: 0 0 10px #fbbf24; 
  }
  footer { padding: 8px; background: #001f4d; text-align: center; font-size: 12px; color: #aaa; border-top: 3px solid #fbbf24; }
  #loginWrap, #dmListWrap { text-align: center; padding: 20px 12px; }
  #loginBtn { padding: 12px 24px; border: 2px solid #fbbf24; border-radius: 12px; background: #5a189a; color: #fff; font-weight: 700; cursor: pointer; font-size: 16px; }
  .userItem { padding: 12px; margin: 8px; border: 2px solid #fbbf24; border-radius: 12px; background: #5a189a; cursor: pointer; text-align: left; }
  #chatWrap { display: none; flex-direction: column; flex: 1; }
  #chatBox { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 12px; max-width: 75%; border: 1px solid #fbbf24; }
  .me { background: #5a189a; align-self: flex-end; }
  .other { background: #3c096c; align-self: flex-start; }
  #inputWrap { display: flex; padding: 12px; background: #1a002e; gap: 8px; border-top: 2px solid #fbbf24; }
  #msgInput { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #fbbf24; background: #2d004d; color: #fff; }
  #sendBtn, #backBtn { padding: 10px 16px; border: 2px solid #fbbf24; border-radius: 12px; background: #5a189a; color: #fff; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <button class="tabBtnHeader active" id="tabPublic">Public</button>
    <button class="tabBtnHeader" id="tabPrivacy">Privacy</button>
    <button class="tabBtnHeader" id="tabDM">DM 1v1</button>
  </header>
  
  <div id="loginWrap">
    <h2>Wajib Login Pioneer</h2>
    <button id="loginBtn">Login dengan Pi</button>
  </div>

  <div id="dmListWrap" style="display:none;">
    <h3>Pilih User untuk DM</h3>
    <div id="userList"></div>
  </div>

  <div id="chatWrap">
    <div id="chatBox"></div>
    <div id="inputWrap">
      <button id="backBtn" style="display:none;">←</button>
      <input id="msgInput" placeholder="Ketik pesan...">
      <button id="sendBtn">Kirim</button>
    </div>
  </div>
  <footer>My Track V=43 © 2026</footer>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const SUPABASE_URL = 'https://aecidmcsdtkshjdnrrrd.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_Ha3M2Q6FzUGaTVV4rtnong_lkHZrQWD'
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let myUsername = ''; 
  let myUid = '';  
  let activeTab = 'message_public'; 
  let dmReceiverUid = null; 

  Pi.init({ version: "2.0", sandbox: false });

  document.getElementById('loginBtn').onclick = async () => {
    const authResult = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
    myUsername = authResult.user.username; 
    myUid = authResult.user.uid;       
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('chatWrap').style.display = 'flex';
    loadMessages(); subscribeRealtime();
  }

  async function loadMessages() {
    let query;
    if (activeTab === 'message_dm' && dmReceiverUid) {
      query = supabase.from('message_dm')
        .select('*')
        .or(`and(sender_uid.eq.${myUid},receiver_uid.eq.${dmReceiverUid}),and(sender_uid.eq.${dmReceiverUid},receiver_uid.eq.${myUid})`)
        .order('created_at', { ascending: true });
      document.getElementById('backBtn').style.display = 'block';
      document.getElementById('msgInput').placeholder = 'DM...';
    } else {
      query = supabase.from(activeTab).select('*').order('created_at', { ascending: true });
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('msgInput').placeholder = 'Ketik pesan...';
    }
    const { data } = await query;
    document.getElementById('chatBox').innerHTML = '';
    data.forEach(m => addMessage(m.sender_username || m.pi_username, m.text));
  }

  async function sendMessage() {
    const text = document.getElementById('msgInput').value.trim();
    if (!text) return;
    if (activeTab === 'message_dm' && dmReceiverUid) {
      await supabase.from('message_dm').insert({ 
        sender_uid: myUid, receiver_uid: dmReceiverUid, 
        sender_username: myUsername, text: text 
      });
    } else {
      await supabase.from(activeTab).insert({ pi_username: myUsername, text: text, pi_uid: myUid });
    }
    document.getElementById('msgInput').value = '';
  }

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === myUsername ? 'me' : 'other');
    div.textContent = sender + ': ' + text;
    document.getElementById('chatBox').appendChild(div);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  }

  let channel;
  function subscribeRealtime() {
    if(channel) supabase.removeChannel(channel);
    const table = activeTab === 'message_dm' ? 'message_dm' : activeTab;
    channel = supabase.channel('realtime:' + table)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: table }, payload => {
        if(activeTab === 'message_dm'){
          if( (payload.new.sender_uid === myUid && payload.new.receiver_uid === dmReceiverUid) || 
              (payload.new.receiver_uid === myUid && payload.new.sender_uid === dmReceiverUid) ){
            addMessage(payload.new.sender_username, payload.new.text);
          }
        } else {
          addMessage(payload.new.pi_username, payload.new.text);
        }
      })
      .subscribe();
  }

  // LOGIC TOMBOL HEADER
  document.getElementById('tabPublic').onclick = () => {
    activeTab = 'message_public'; dmReceiverUid = null;
    setActiveTab('tabPublic'); 
    document.getElementById('chatWrap').style.display = 'flex';
    document.getElementById('dmListWrap').style.display = 'none';
    loadMessages(); subscribeRealtime();
  }
  document.getElementById('tabPrivacy').onclick = () => {
    activeTab = 'message_privacy'; dmReceiverUid = null;
    setActiveTab('tabPrivacy'); 
    document.getElementById('chatWrap').style.display = 'flex';
    document.getElementById('dmListWrap').style.display = 'none';
    loadMessages(); subscribeRealtime();
  }
  document.getElementById('tabDM').onclick = async () => {
    activeTab = 'message_dm';
    setActiveTab('tabDM');
    document.getElementById('chatWrap').style.display = 'none';
    document.getElementById('dmListWrap').style.display = 'block';
    const { data: users } = await supabase.from('message_public').select('pi_uid, pi_username').neq('pi_uid', myUid);
    const uniqueUsers = [...new Map(users.map(u => [u.pi_uid, u])).values()];
    document.getElementById('userList').innerHTML = uniqueUsers.map(u => 
      `<div class="userItem" onclick="openDM('${u.pi_uid}', '${u.pi_username}')">${u.pi_username}</div>`
    ).join('') || '<p>Belum ada user lain yang chat Public</p>';
  }

  window.openDM = (uid, username) => {
    dmReceiverUid = uid;
    document.getElementById('dmListWrap').style.display = 'none';
    document.getElementById('chatWrap').style.display = 'flex';
    document.getElementById('msgInput').placeholder = 'DM ke ' + username + '...';
    loadMessages(); subscribeRealtime();
  }

  document.getElementById('backBtn').onclick = () => {
    document.getElementById('tabDM').click();
  }

  function setActiveTab(id) {
    document.querySelectorAll('.tabBtnHeader').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('msgInput').addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
  function onIncompletePaymentFound(payment) { console.log('Incomplete:', payment); }
</script>
</body>
</html>
