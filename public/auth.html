<!DOCTYPE html><html><body><script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient('https://aecidmcsdtkshjdnrrrd.supabase.co', 'sb_publishable_Ha3M2Q6FzUGaTVV4rtnong_lkHZrQWD');

const hash = window.location.hash;
const returnTo = localStorage.getItem('pi_return_to') || 'index.html'; 

if (hash.includes('access_token')) {
  const piToken = new URLSearchParams(hash.substring(1)).get('access_token');
  
  // KODE INI GAK BUTUH PROVIDER PI DI SUPABASE
  supabase.auth.signInWithIdToken({ provider: 'pi', token: piToken })
  .then(() => { localStorage.removeItem('pi_return_to'); window.location.href = returnTo; })
  .catch(e => alert('Gagal: ' + e.message));
} else { window.location.href = returnTo; }
</script></html>
