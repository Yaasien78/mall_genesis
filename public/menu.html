<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTrack Menu</title>
  <style>
    :root {
      --head-foot: #2E5A8A; /* Biru Tua = Head & Foot */
      --col-1: #A0D8F1; /* Biru Muda -25% */
      --col-2: #5A9BD5; /* Biru Muda -50% */
      --col-3: #2E5A8A; /* Biru Tua -75% */
      --gold-border: #DAA520; 
      --content-bg: #F0F8FF; 
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--content-bg); }

    .head {
      height: 60px; background: var(--head-foot);
      border-bottom: 2px solid var(--gold-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; color: #fff;
    }
    .head .logo { font-weight: bold; font-size: 18px; }
    .back-btn { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #fff; font-size: 14px; }
    .hamburger { display: flex; flex-direction: column; gap: 4px; }
    .hamburger span { width: 22px; height: 2px; background: #fff; border-radius: 2px; }

    .container { display: flex; flex: 1; }
    .sidebar { width: 250px; background: var(--content-bg); }
    .sidebar ul { list-style: none; height: 100%; }
    .sidebar li { height: 33.33%; } /* Kolom panjang sama rata */
    .sidebar li a {
      display: flex; align-items: center; height: 100%; padding: 0 20px;
      text-decoration: none; color: #fff; font-weight: 500;
      border-left: 6px solid var(--gold-border); border-bottom: 2px solid #fff;
    }
    .nav-profil a { background: var(--col-1); } 
    .nav-ads a { background: var(--col-2); }    
    .nav-info a { background: var(--col-3); }   

    .content { 
      flex: 1; padding: 40px 20px; background: var(--content-bg); 
      text-align: center; /* Biar teks di tengah */
    }
    .content h2 { font-size: 32px; line-height: 1.3; }
    .content .username { 
      font-size: 20px; font-weight: bold; color: var(--head-foot); 
      margin-top: 8px; 
    }
    .content p { font-size: 16px; margin-top: 10px; }

    .foot {
      height: 50px; background: var(--head-foot);
      border-top: 2px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 500;
    }
  </style>
</head>
<body>

  <header class="head">
    <div class="logo">Menu</div> 
    <a href="index.html" class="back-btn">
      <div class="hamburger"><span></span><span></span><span></span></div>
      Back to Cover
    </a>
  </header>

  <div class="container">
    <nav class="sidebar">
      <ul>
        <li class="nav-profil"><a href="profil.html">Profil</a></li>
        <li class="nav-ads"><a href="ads.html">Ads</a></li>
        <li class="nav-info"><a href="info.html">Info Public</a></li>
      </ul>
    </nav>

    <main class="content">
      <h2>
        Selamat Datang<br>
        di My Track<br>
        Appnya Pioneer
      </h2>
      <div class="username" id="username">@username</div> <!-- Gabung di sini -->
      <p>Klik menu di kiri buat pindah view.</p>
    </main>
  </div>

  <footer class="foot">
    <div>My Track @2026 | Terbit: <span id="tgl"></span></div>
  </footer>

  <script>
    const tgl = new Date();
    document.getElementById('tgl').innerText = tgl.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    
    // Auto ambil @username Pi. Ganti 'pioneer' ke data beneran lu
    const user = localStorage.getItem('pi_username') || 'pioneer'; 
    document.getElementById('username').innerText = '@' + user;
  </script>
</body>
</html>
