<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTrack - Menu</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    button { padding: 15px 30px; font-size: 18px; background: #6f42c1; color: white; border: none; border-radius: 12px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <h2 id="userText">Cek sesi...</h2>
  <p>Biaya Posting Iklan: 0.1 π</p>
  <button id="payBtn" onclick="bayarPosting()" disabled>Post + 0.1π</button>

<script>
  const URL_BACKEND = "https://backend-lu.vercel.app"; // GANTI INI KE BACKEND LU

  // 1. INIT PI DULU. WAJIB.
  Pi.init({ version: "2.0", sandbox: true }).then(() => {
    console.log("Pi SDK Ready di menu.html");

    // 2. CEK APA UDAH LOGIN DARI INDEX.HTML
    const username = localStorage.getItem('pi_username');
    const token = localStorage.getItem('pi_accessToken');

    if (!token || !username) {
      alert("Sesi habis bro. Login ulang ya");
      window.location.href = 'index.html'; // Tendang balik
      return;
    }

    document.getElementById('userText').innerText = `Halo @${username}`;
    document.getElementById('payBtn').disabled = false; // Aktifin tombol

  }).catch(err => {
    alert("Gagal init Pi SDK: " + err);
  });

  // 3. FUNGSI WAJIB: KALO PEMBAYARAN KETENGAH JALAN LALU APP DITUTUP
  function onIncompletePaymentFound(payment) {
    console.log("Ada pembayaran nyangkut:", payment);
    // Langsung complete biar gak nyangkut di server Pi
    fetch(`${URL_BACKEND}/api/complete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentId: payment.identifier, token: localStorage.getItem('pi_accessToken') })
    });
  }

  // 4. TOMBOL BAYAR 0.1π
  function bayarPosting() {
    document.getElementById('payBtn').disabled = true; // Biar gak diklik 2x

    const paymentData = {
      amount: 0.1,
      memo: "MyTrack - Biaya Posting Iklan",
      metadata: { type: "post_iklan", user: localStorage.getItem('pi_username') } 
    };

    Pi.createPayment(paymentData, {
      onReadyForServerApproval: function(paymentId) {
        console.log("Approve:", paymentId);
        // KIRIM KE BACKEND BUAT DI-APPROVE
        fetch(`${URL_BACKEND}/api/approve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentId: paymentId, token: localStorage.getItem('pi_accessToken') })
        });
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        console.log("Complete:", paymentId, txid);
        // KIRIM KE BACKEND BUAT DI-COMPLETE + SIMPAN IKLAN
        fetch(`${URL_BACKEND}/api/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentId: paymentId, txid: txid, token: localStorage.getItem('pi_accessToken') })
        }).then(res => res.json())
        .then(data => {
          alert("Bayar sukses! Iklan lu udah tayang bro ✅");
          document.getElementById('payBtn').disabled = false;
        });
      },
      onCancel: function(paymentId) { 
        alert("Pembayaran dibatalkan");
        document.getElementById('payBtn').disabled = false;
      },
      onError: function(error, payment) { 
        alert("Error bayar: " + error);
        document.getElementById('payBtn').disabled = false;
      }
    });
  }
</script>

</body>
</html>
