<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - My Track</title>
  <link rel="stylesheet" href="globals.css"> <!-- WAJIB -->
</head>
<body>

  <!-- 1. Sidebar Dipanggil Dulu -->
  <div id="menu-container"></div> 

  <!-- 2. Konten Halaman -->
  <main>
    <div class="card">
      <h1>Profil Saya</h1>
      <p id="username">Nama: Belum Login</p>
      <p id="saldo-pi">Saldo Pi: 0.00 π</p>
      <button id="btn-login-pi">Login dengan Pi</button>
      <button id="btn-logout" style="background: var(--danger); display:none;">Logout</button>
    </div>
  </main>

  <script>
    // Load menu.html ke dalam #menu-container
    fetch('menu.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('menu-container').innerHTML = data;
        // Setelah menu masuk, baru jalanin menu.js biar active nya nyala
        const script = document.createElement('script');
        script.src = 'menu.js';
        document.body.appendChild(script);
      });
  </script>
  
</body>
</html>
