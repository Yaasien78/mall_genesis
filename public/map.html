<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Map Global - My Track</title>
<style>
  body { background:#1a0f2e; color:#FFD700; font-family:sans-serif; margin:0; padding-bottom:60px; }
  .header { background:#0f1a2e; padding:12px; text-align:center; border-bottom:2px solid #FFD700; }
  .header a { color:#FFD700; text-decoration:none; font-weight:bold; }
  h2 { color:#FFD700; padding:16px 0 8px 0; margin:0; text-align:center; }
  .map-box { 
    background: #2c1a4d; 
    height: 55vh; 
    margin: 12px; 
    border-radius: 16px; 
    border: 1px solid #FFD70033;
    position:relative; overflow:hidden;
  }
  .dot-me { 
    width: 18px; height: 18px; background:#FF0000; border-radius:50%; 
    position:absolute; box-shadow: 0 0 15px #FF0000; 
    border: 3px solid white; transform: translate(-50%, -50%);
    animation: pulse 1.5s infinite; z-index:10;
  }
  .dot-other { 
    width: 10px; height: 10px; background:#FFD700; border-radius:50%; 
    position:absolute; box-shadow: 0 0 8px #FFD700; transform: translate(-50%, -50%);
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,0.7)} 50%{box-shadow:0 0 0 12px rgba(255,0,0,0)} }
  #status { font-size:14px; text-align:center; padding:8px; }
  .footer { 
    position:fixed; bottom:0; left:0; right:0; 
    background:#0f1a2e; text-align:center; padding:10px; 
    font-size:12px; border-top:2px solid #FFD700;
  }
</style>
</head>
<body>
  <div class="header">
    <a href="index.html">← My Track</a>
  </div>

  <h2>2. Pi Map Global</h2>
  <div id="status">Mencari lokasi kamu...</div>
  
  <div class="map-box" id="map">
    <div class="dot-other" style="top:48%; left:52%;" title="Jakarta"></div>
    <div class="dot-other" style="top:55%; left:68%;" title="Malaysia"></div>
  </div>

  <div class="footer">
    My Track V=43 © 2026 | Titik = Pioneer Pi | Swipe Kiri/Kanan
  </div>

<script>
const mapBox = document.getElementById('map');
const statusTxt = document.getElementById('status');

navigator.geolocation.getCurrentPosition(pos => {
  const lat = pos.coords.latitude; // -3.6459
  const lon = pos.coords.longitude; // 103.7923
  statusTxt.innerText = `Lokasi aktif: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;

  // RUMUS BARU: Biar titik merah di tengah Indonesia, gak mentok pojok
  const topPercent = 60 - (lat * 3); // Palembang -3.6 = sekitar 70%
  const leftPercent = 10 + (lon - 95) * 1.3; // 103.7 = sekitar 21%

  const myDot = document.createElement('div');
  myDot.className = 'dot-me';
  myDot.style.top = `${Math.max(5, Math.min(95, topPercent))}%`;
  myDot.style.left = `${Math.max(5, Math.min(95, leftPercent))}%`;
  myDot.title = "Kamu di sini";
  mapBox.appendChild(myDot);

}, err => {
  statusTxt.innerText = "Gagal ambil lokasi. Aktifkan GPS & izinkan ya.";
});
</script>
</body>
</html>
