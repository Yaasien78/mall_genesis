<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ads - My Track</title>
  <link rel="stylesheet" href="globals.css">
</head>
<body>
  <div id="menu-container"></div> 

  <main>
    <div class="card">
      <h1>Pasang Iklan UMKM <span class="badge-new">NEW</span></h1>
      <p>Bayar pake Pi. Iklan lu nongol di `Info Public` semua user.</p>
      <hr style="margin: 16px 0; border-color: #334155;">
      <p><b>Harga:</b> 1 π / 7 hari</p>
      <button id="btn-bayar-iklan">Bayar & Pasang Iklan Sekarang</button>
    </div>
  </main>

  <script>
    fetch('menu.html').then(res => res.text()).then(data => {
      document.getElementById('menu-container').innerHTML = data;
      const script = document.createElement('script');
      script.src = 'menu.js';
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
